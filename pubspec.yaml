name: nexa_app
description: "NEXA — Plateforme IA de gestion pastorale pour les éleveurs africains"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# Platform support declaration
platforms:
  android:
  ios:
  web:
  windows:

dependencies:
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Camera & Image
  camera: ^0.12.0+1
  camera_windows: ^0.2.1
  image_picker: ^1.0.4
  image: ^4.1.3

  # Maps
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  flutter_map_cancellable_tile_provider: ^3.1.1

  # AI / TFLite
  tflite_flutter: ^0.12.1

  # Storage local (offline-first)
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.1

  # UI & Animations
  lottie: ^3.0.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^1.1.1

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.2
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  share_plus: ^12.0.1
  pdf: ^3.10.7
  # http
  http: ^1.2.0

  # Icons & SVG
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/